<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Stream Overlay - Slide</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1920px; height: 1080px;
      overflow: hidden;
      background: transparent !important;
      background-color: transparent !important;
    }
    @keyframes slideUpAnim {
      0%   { opacity: 0; transform: translateY(80px); }
      12%  { opacity: 1; transform: translateY(0px); }
      80%  { opacity: 1; transform: translateY(0px); }
      100% { opacity: 0; transform: translateY(40px); }
    }
    #overlay {
      position: absolute;
      bottom: 60px; left: 0; right: 0;
      display: flex; justify-content: center;
      animation: slideUpAnim var(--dur) ease forwards;
      opacity: 0;
    }
    #card {
      display: flex; align-items: center; gap: 24px;
      padding: 20px 40px;
      background: rgba(15,10,40,0.85);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }
    #logo-box {
      width: 64px; height: 64px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 700; color: white;
      font-family: Arial, sans-serif; flex-shrink: 0;
    }
    .divider { width: 1px; height: 48px; background: rgba(255,255,255,0.2); flex-shrink: 0; }
    .text-wrap { display: flex; flex-direction: column; gap: 4px; }
    .sponsor { font-family: Arial, sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 2.5px; text-transform: uppercase; color: rgba(255,255,255,0.45); }
    .brand { font-family: Arial, sans-serif; font-size: 26px; font-weight: 700; color: #fff; line-height: 1; }
    .tagline { font-family: Arial, sans-serif; font-size: 14px; color: rgba(255,255,255,0.6); margin-top: 2px; }
    #pill { margin-left: 8px; padding: 6px 16px; border-radius: 999px; font-family: Arial, sans-serif; font-size: 13px; font-weight: 700; color: white; flex-shrink: 0; }
  </style>
</head>
<body>
  <div id="overlay">
    <div id="card">
      <div id="logo-box"></div>
      <div class="divider"></div>
      <div class="text-wrap">
        <span class="sponsor">Sponsored by</span>
        <span class="brand" id="brand-name"></span>
        <span class="tagline" id="tagline"></span>
      </div>
      <div id="pill">Visit Now</div>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const brandName = params.get('brand_name') || 'Your Brand';
    const tagline   = params.get('tagline')    || 'Your tagline here';
    const color     = '#' + (params.get('color') || '4F46E5').replace('#','');
    const duration  = parseInt(params.get('duration') || '8000');
    document.documentElement.style.setProperty('--dur', (duration/1000) + 's');
    document.getElementById('brand-name').textContent = brandName;
    document.getElementById('tagline').textContent = tagline;
    document.getElementById('logo-box').textContent = brandName.charAt(0).toUpperCase();
    document.getElementById('logo-box').style.background = `linear-gradient(135deg, ${color}, ${color}99)`;
    document.getElementById('pill').style.background = `linear-gradient(135deg, ${color}, ${color}99)`;
  </script>
</body>
</html>
