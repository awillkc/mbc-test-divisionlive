<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Rive Test</title>
  <script src="./rive.js"></script>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #000000; }
    canvas {
      position: absolute;
      bottom: 40px; right: 40px;
      width: 500px; height: 500px;
      border: 2px solid red;
    }
    #status {
      position: absolute;
      top: 20px; left: 20px;
      color: white; font-size: 24px;
      font-family: Arial;
    }
  </style>
</head>
<body>
  <div id="status">Starting...</div>
  <canvas id="rive-canvas" width="500" height="500"></canvas>
  <script>
    const status = document.getElementById('status');
    status.textContent = 'Rive object: ' + (typeof rive);
    try {
      const r = new rive.Rive({
        src: 'https://divisionstream.live/badge-idea1.riv',
        canvas: document.getElementById('rive-canvas'),
        artboard: 'Badge1',
        stateMachines: 'State Machine 1',
        autoplay: true,
        onLoad: () => {
          status.textContent = 'Loaded! Artboards: ' + r.artboardNames.join(', ');
          r.resizeDrawingSurfaceToCanvas();
        },
        onLoadError: (e) => {
          status.textContent = 'Load error: ' + JSON.stringify(e);
        }
      });
    } catch(e) {
      status.textContent = 'Crash: ' + e.message;
    }
  </script>
</body>
</html>
