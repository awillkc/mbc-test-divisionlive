<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Stream Overlay - Badge</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1920px; height: 1080px;
      overflow: hidden;
      background: transparent !important;
      background-color: transparent !important;
    }
    @keyframes badgeAnim {
      0%   { opacity: 0; transform: scale(0.6); }
      15%  { opacity: 1; transform: scale(1); }
      80%  { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.8); }
    }
    #overlay {
      position: absolute;
      bottom: 80px; right: 80px;
      opacity: 0;
    }
    #overlay.playing {
      animation: badgeAnim var(--dur) ease forwards;
    }
    #card {
      display: flex; align-items: center; gap: 24px;
      padding: 28px 40px;
      background: rgba(15,10,40,0.9);
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 28px;
      box-shadow: 0 8px 48px rgba(0,0,0,0.6);
    }
    #logo-box {
      width: 88px; height: 88px; border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 44px; font-weight: 700; color: white;
      font-family: Arial, sans-serif; flex-shrink: 0;
      overflow: hidden;
    }
    #logo-box img { width: 100%; height: 100%; object-fit: contain; }
    .text-wrap { display: flex; flex-direction: column; gap: 4px; }
    .sponsor { font-family: Arial, sans-serif; font-size: 18px; font-weight: 600; letter-spacing: 4px; text-transform: uppercase; color: rgba(255,255,255,0.4); }
    .brand { font-family: Arial, sans-serif; font-size: 32px; font-weight: 700; color: #fff; line-height: 1; }
    .tagline { font-family: Arial, sans-serif; font-size: 22px; color: rgba(255,255,255,0.55); }
    #promo { font-family: Arial, sans-serif; font-size: 20px; font-weight: 700; color: white; margin-top: 6px; padding: 4px 16px; border-radius: 999px; display: inline-block; }
  </style>
</head>
<body>
  <div id="overlay">
    <div id="card">
      <div id="logo-box"></div>
      <div class="text-wrap">
        <span class="sponsor">Sponsored by</span>
        <span class="brand" id="brand-name"></span>
        <span class="tagline" id="tagline"></span>
        <span id="promo"></span>
      </div>
    </div>
  </div>
  <script>
    const params    = new URLSearchParams(window.location.search);
    const brandName = params.get('brand_name') || 'Your Brand';
    const tagline   = params.get('tagline')    || 'Your tagline here';
    const color     = '#' + (params.get('color') || '4F46E5').replace('#','');
    const duration  = parseInt(params.get('duration') || '8000');
    const promoCode = params.get('promo')      || null;
    const loopMins  = parseFloat(params.get('loop') || '0');
    const logoUrl   = params.get('logo_url') || params.get('logo') || null;

    document.documentElement.style.setProperty('--dur', (duration/1000) + 's');
    document.getElementById('brand-name').textContent = brandName;
    document.getElementById('tagline').textContent    = tagline;

    const logoBox = document.getElementById('logo-box');
    if (logoUrl) {
      const img = document.createElement('img');
      img.src = decodeURIComponent(logoUrl);
      logoBox.appendChild(img);
    } else {
      logoBox.textContent = brandName.charAt(0).toUpperCase();
      logoBox.style.background = `linear-gradient(135deg, ${color}, ${color}99)`;
    }

    const promoEl = document.getElementById('promo');
    if (promoCode) {
      promoEl.textContent = promoCode;
      promoEl.style.background = `linear-gradient(135deg, ${color}, ${color}99)`;
    } else {
      promoEl.style.display = 'none';
    }

    function play() {
      const el = document.getElementById('overlay');
      el.classList.remove('playing');
      void el.offsetWidth;
      el.classList.add('playing');
    }

    play();
    if (loopMins > 0) setInterval(play, loopMins * 60 * 1000);
  </script>
</body>
</html>
