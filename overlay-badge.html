<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Stream Overlay - Badge</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1920px; height: 1080px;
      overflow: hidden;
      background: transparent !important;
      background-color: transparent !important;
    }
    @keyframes badgeAnim {
      0%   { opacity: 0; transform: scale(0.6); }
      15%  { opacity: 1; transform: scale(1); }
      80%  { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.8); }
    }
    #overlay {
      position: absolute;
      bottom: 40px; right: 40px;
      animation: badgeAnim var(--dur) ease forwards;
      opacity: 0;
    }
    #card {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 20px;
      background: rgba(15,10,40,0.9);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 14px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.6);
    }
    #logo-box {
      width: 44px; height: 44px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 700; color: white;
      font-family: Arial, sans-serif; flex-shrink: 0;
    }
    .text-wrap { display: flex; flex-direction: column; gap: 2px; }
    .sponsor { font-family: Arial, sans-serif; font-size: 9px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.4); }
    .brand { font-family: Arial, sans-serif; font-size: 16px; font-weight: 700; color: #fff; line-height: 1; }
    .tagline { font-family: Arial, sans-serif; font-size: 11px; color: rgba(255,255,255,0.55); }
  </style>
</head>
<body>
  <div id="overlay">
    <div id="card">
      <div id="logo-box"></div>
      <div class="text-wrap">
        <span class="sponsor">Sponsored by</span>
        <span class="brand" id="brand-name"></span>
        <span class="tagline" id="tagline"></span>
      </div>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const brandName = params.get('brand_name') || 'Your Brand';
    const tagline   = params.get('tagline')    || 'Your tagline here';
    const color     = '#' + (params.get('color') || '4F46E5').replace('#','');
    const duration  = parseInt(params.get('duration') || '8000');
    document.documentElement.style.setProperty('--dur', (duration/1000) + 's');
    document.getElementById('brand-name').textContent = brandName;
    document.getElementById('tagline').textContent = tagline;
    document.getElementById('logo-box').textContent = brandName.charAt(0).toUpperCase();
    document.getElementById('logo-box').style.background = `linear-gradient(135deg, ${color}, ${color}99)`;
  </script>
</body>
</html>
