<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:; script-src * 'unsafe-inline' 'unsafe-eval'; frame-src *;">
<meta name="viewport" content="width=1920, height=1080">
<title>DivisionStream Overlay</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent !important;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
  }
  #overlay-frame {
    position: fixed;
    inset: 0;
    width: 1920px;
    height: 1080px;
    border: 0;
    background: transparent;
  }
</style>
</head>
<body>
<iframe id="overlay-frame" style="display:none" allow="autoplay"></iframe>
<script data-cfasync="false" type="text/javascript">
(function() {
  console.log('[overlay] page loaded, starting fresh');

  var params = new URLSearchParams(window.location.search);
  var streamerId = params.get('sid');
  if (!streamerId) { console.log('[overlay] no sid, exiting'); return; }

  var SUPABASE_URL = 'https://qwasgcysgppajmdknlor.supabase.co';
  var OVERLAY_BASE = 'https://divisionstream.live';
  var frame = document.getElementById('overlay-frame');
  var GAP_MS = 3000;
  var TICK_MS = 30000;
  var SKIP_TYPES = { frame: true };

  var lastPlayed = {};
  var playedOnce = {};
  var playing = false;
  var cachedAssets = [];

  function enc(v) { return encodeURIComponent(v || ''); }

  function buildUrl(c) {
    var type = (c.overlay_type || '').toLowerCase();
    var layer = 'layer-name=DivisionStream+-+' + enc(c.brand_name) + '&layer-width=1920&layer-height=1080';

    if (type === 'rive' && c.animation_url)
      return OVERLAY_BASE + '/rive-overlay.html?rive_url=' + enc(c.animation_url) + '&duration=' + c.duration_ms + '&loop=0&' + layer;
    if (type === 'gif' && c.animation_url)
      return OVERLAY_BASE + '/gif-overlay.html?url=' + enc(c.animation_url) + '&duration=' + c.duration_ms + '&loop=0&' + layer;
    if (type === 'vertical-video' && c.animation_url)
      return OVERLAY_BASE + '/vertical-video-overlay.html?url=' + enc(c.animation_url) + '&duration=' + c.duration_ms + '&loop=0&' + layer;
    if (type === 'quarter-video' && c.animation_url) {
      var qc = (c.primary_color || '').replace(/^#/, '');
      return OVERLAY_BASE + '/quarter-video-overlay.html?url=' + enc(c.animation_url) + '&duration=' + c.duration_ms + '&loop=0&color=' + enc(qc) + '&' + layer;
    }
    if (type === 'video-takeover' && c.animation_url)
      return OVERLAY_BASE + '/video-takeover.html?url=' + enc(c.animation_url) + '&duration=' + c.duration_ms + '&loop=0&' + layer;
    if (type === 'banner' && (c.animation_url || c.tagline)) {
      var bc = (c.primary_color || '').replace(/^#/, '');
      return OVERLAY_BASE + '/banner-overlay.html?url=' + enc(c.animation_url) + '&text=' + enc(c.tagline) + '&logo=' + enc(c.logo_url) + '&duration=' + c.duration_ms + '&loop=0&color=' + enc(bc) + '&' + layer;
    }
    var color = (c.primary_color || '').replace(/^#/, '');
    return OVERLAY_BASE + '/overlay-slide.html?brand_name=' + enc(c.brand_name) + '&tagline=' + enc(c.tagline) + '&color=' + enc(color) + '&duration=' + c.duration_ms + '&loop=0&promo=' + enc(c.promo_code) + '&logo=' + enc(c.logo_url) + '&' + layer;
  }

  function wait(ms) {
    return new Promise(function(resolve) { setTimeout(resolve, ms); });
  }

  function showCampaign(c) {
    return new Promise(function(resolve) {
      var type = (c.overlay_type || '').toLowerCase();
      var url = buildUrl(c);
      console.log('[overlay] showing: ' + c.brand_name + ' (' + type + ')');
      frame.src = url;
      frame.style.display = 'block';

      function done() {
        clearTimeout(timer);
        window.removeEventListener('message', onMsg);
        frame.style.display = 'none';
        frame.src = 'about:blank';
        console.log('[overlay] done: ' + c.brand_name);
        resolve();
      }

      function onMsg(e) {
        if (e.data && e.data.type === 'overlay-done') done();
      }

      var timer;
      if (type === 'video-takeover') {
        timer = setTimeout(done, 300000);
        window.addEventListener('message', onMsg);
      } else if (type === 'vertical-video' || type === 'quarter-video') {
        var dur = (c.duration_ms && c.duration_ms > 0) ? c.duration_ms + 2000 : 30000;
        timer = setTimeout(done, dur);
        window.addEventListener('message', onMsg);
      } else {
        var dur = (c.duration_ms && c.duration_ms > 0) ? c.duration_ms + 2000 : 120000;
        timer = setTimeout(done, dur);
      }
    });
  }

 return fetch(SUPABASE_URL + '/functions/v1/streamer-overlay-data?sid=' + enc(streamerId) + '&t=' + Date.now(), {
  cache: 'no-store'
})
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var list = Array.isArray(data) ? data : [];
      console.log('[overlay] poll: ' + list.length + ' campaigns');

      var assets = [];
      for (var i = 0; i < list.length; i++) {
        var c = list[i];
        if (c.assets && c.assets.length > 0) {
          for (var k = 0; k < c.assets.length; k++) {
            var a = c.assets[k];
            if (SKIP_TYPES[(a.overlay_type || '').toLowerCase()]) continue;
            assets.push({
              key: a.id || (c.id + ':' + a.sequence_order),
              loopMins: typeof a.loop_mins === 'number' ? a.loop_mins : c.loop_mins || 0,
              campaign: {
                id: c.id,
                brand_name: c.brand_name,
                logo_url: c.logo_url,
                tagline: c.tagline,
                promo_code: c.promo_code,
                overlay_type: a.overlay_type,
                animation_url: a.asset_url,
                duration_ms: a.duration_ms,
                loop_mins: a.loop_mins,
                primary_color: a.primary_color
              },
              order: a.sequence_order || k
            });
          }
        } else {
          if (SKIP_TYPES[(c.overlay_type || '').toLowerCase()]) continue;
          assets.push({
            key: c.id + ':legacy',
            loopMins: c.loop_mins || 0,
            campaign: c,
            order: 1
          });
        }
      }

      assets.sort(function(a, b) { return a.order - b.order; });
      cachedAssets = assets;
      console.log('[overlay] ' + assets.length + ' playable assets');
      return assets;
    })
    .catch(function(err) {
      console.error('[overlay] poll error:', err);
      return cachedAssets;
    });
  }

  function getDue() {
    var now = Date.now();
    return cachedAssets.filter(function(a) {
      if (a.loopMins <= 0) return !playedOnce[a.key];
      var lp = lastPlayed[a.key];
      return !lp || (now - lp) >= a.loopMins * 60 * 1000;
    });
  }

  function recordSession(c) {
    fetch(SUPABASE_URL + '/functions/v1/streamer-overlay-data', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'record_session',
        streamerId: streamerId,
        campaignId: c.id,
        durationMs: Number(c.duration_ms) || 0
      })
    }).catch(function(e) { console.error('[overlay] record error:', e); });
  }

  function playQueue(queue, index) {
    if (index >= queue.length) {
      playing = false;
      console.log('[overlay] queue complete');
      return;
    }
    var a = queue[index];
    showCampaign(a.campaign).then(function() {
      lastPlayed[a.key] = Date.now();
      if (a.loopMins <= 0) playedOnce[a.key] = true;
      recordSession(a.campaign);
      if (index < queue.length - 1) {
        return wait(GAP_MS).then(function() {
          playQueue(queue, index + 1);
        });
      } else {
        playing = false;
        console.log('[overlay] queue complete');
      }
    });
  }

  function tick() {
    if (playing) {
      setTimeout(tick, TICK_MS);
      return;
    }
    poll().then(function() {
      var due = getDue();
      if (due.length > 0) {
        playing = true;
        playQueue(due, 0);
      }
      setTimeout(tick, TICK_MS);
    });
  }

  function start() {
    lastPlayed = {};
    playedOnce = {};
    playing = false;
    cachedAssets = [];
    console.log('[overlay] starting');

    poll().then(function() {
      var due = getDue();
      if (due.length > 0) {
        playing = true;
        playQueue(due, 0);
      }
      setTimeout(tick, TICK_MS);
    });
  }

  setTimeout(start, 2000);
})();
</script>
</body>
</html>
