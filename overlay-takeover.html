<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Stream Overlay - Takeover</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1920px; height: 1080px;
      overflow: hidden;
      background: transparent !important;
      background-color: transparent !important;
    }
    @keyframes takeoverAnim {
      0%   { opacity: 0; transform: translateY(20px); }
      10%  { opacity: 1; transform: translateY(0px); }
      80%  { opacity: 1; transform: translateY(0px); }
      100% { opacity: 0; transform: translateY(10px); }
    }
    #overlay {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      opacity: 0;
    }
    #overlay.playing {
      animation: takeoverAnim var(--dur) ease forwards;
    }
    #bar {
      width: 100%; padding: 28px 80px;
      display: flex; align-items: center; justify-content: space-between;
      background: linear-gradient(90deg, rgba(15,10,40,0.97) 0%, rgba(30,20,80,0.95) 100%);
      border-top: 2px solid rgba(255,255,255,0.1);
    }
    .left { display: flex; align-items: center; gap: 24px; }
    #logo-box {
      width: 72px; height: 72px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; font-weight: 700; color: white;
      font-family: Arial, sans-serif; flex-shrink: 0;
      overflow: hidden;
    }
    #logo-box img { width: 100%; height: 100%; object-fit: contain; }
    .text-wrap { display: flex; flex-direction: column; gap: 4px; }
    .sponsor { font-family: Arial, sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 2.5px; text-transform: uppercase; color: rgba(255,255,255,0.4); }
    .brand { font-family: Arial, sans-serif; font-size: 32px; font-weight: 700; color: #fff; line-height: 1; }
    .tagline { font-family: Arial, sans-serif; font-size: 16px; color: rgba(255,255,255,0.6); }
    #promo { padding: 12px 32px; border-radius: 999px; font-family: Arial, sans-serif; font-size: 16px; font-weight: 700; color: white; }
  </style>
</head>
<body>
  <div id="overlay">
    <div id="bar">
      <div class="left">
        <div id="logo-box"></div>
        <div class="text-wrap">
          <span class="sponsor">Sponsored by</span>
          <span class="brand" id="brand-name"></span>
          <span class="tagline" id="tagline"></span>
        </div>
      </div>
      <div id="promo"></div>
    </div>
  </div>
  <script>
    const params    = new URLSearchParams(window.location.search);
    const brandName = params.get('brand_name') || 'Your Brand';
    const tagline   = params.get('tagline')    || 'Your tagline here';
    const color     = '#' + (params.get('color') || '4F46E5').replace('#','');
    const duration  = parseInt(params.get('duration') || '8000');
    const promoCode = params.get('promo')      || null;
    const loopMins  = parseFloat(params.get('loop') || '0');
    const logoUrl   = params.get('logo_url') || params.get('logo')   || null;

    document.documentElement.style.setProperty('--dur', (duration/1000) + 's');
    document.getElementById('brand-name').textContent = brandName;
    document.getElementById('tagline').textContent    = tagline;

    const logoBox = document.getElementById('logo-box');
    if (logoUrl) {
      const img = document.createElement('img');
      img.src = decodeURIComponent(logoUrl);
      logoBox.appendChild(img);
    } else {
      logoBox.textContent = brandName.charAt(0).toUpperCase();
      logoBox.style.background = `linear-gradient(135deg, ${color}, ${color}99)`;
    }

    const promoEl = document.getElementById('promo');
    if (promoCode) {
      promoEl.textContent = promoCode;
      promoEl.style.background = `linear-gradient(135deg, ${color}, ${color}99)`;
    } else {
      promoEl.style.display = 'none';
    }

    function play() {
      const el = document.getElementById('overlay');
      el.classList.remove('playing');
      void el.offsetWidth;
      el.classList.add('playing');
    }

    play();
    if (loopMins > 0) setInterval(play, loopMins * 60 * 1000);
  </script>
</body>
</html>
