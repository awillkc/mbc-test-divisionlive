<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>Vertical Video Overlay</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: transparent !important;
  }
  body {
    position: relative;
  }
#panel {
  position: fixed;
  top: 50%;
  right: 0;
  width: 360px;
  height: 640px;
  transform: translateY(-50%);
  border-radius: 12px 0 0 12px;
  overflow: hidden;
  background: #000;
  box-shadow: -10px 18px 40px rgba(0, 0, 0, 0.28);
  opacity: 0;
  transition: opacity 0.5s ease;
  display: none;
}
