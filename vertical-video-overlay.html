<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>Vertical Video Overlay</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: transparent !important;
  }
  #panel {
    position: fixed;
    top: 50%;
    right: 0;
    width: 360px;
    height: 640px;
    transform: translateY(-50%);
    border-radius: 12px 0 0 12px;
    overflow: hidden;
    background: #000;
    box-shadow: -10px 18px 40px rgba(0, 0, 0, 0.28);
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  #video {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
    background: #000;
  }
</style>
</head>
<body>
  <div id="panel">
    <video id="video" playsinline preload="auto"></video>
  </div>
  <script data-cfasync="false" type="text/javascript">
  (function() {
    var params   = new URLSearchParams(window.location.search);
    var url      = params.get('url');
    var duration = parseInt(params.get('duration') || '0', 10);
    var loopMins = parseInt(params.get('loop') || '0', 10);
    if (!url) return;
    var panel = document.getElementById('panel');
    var video = document.getElementById('video');
    function notifyDone() {
      try { window.parent.postMessage({ type: 'overlay-done' }, '*'); } catch(e) {}
    }
    function fadeOut(cb) {
      panel.style.opacity = '0';
      setTimeout(function() {
        video.pause();
        if (cb) cb();
      }, 600);
    }
    function play() {
      video.src = url;
      video.play().then(function() {
        requestAnimationFrame(function() {
          panel.style.opacity = '1';
        });
      }).catch(function() {
        video.muted = true;
        video.play().then(function() {
          requestAnimationFrame(function() {
            panel.style.opacity = '1';
          });
        }).catch(function() {});
      });
      if (duration > 0) {
        setTimeout(function() { fadeOut(notifyDone); }, duration);
      } else {
        video.onended = function() { fadeOut(notifyDone); };
      }
    }
    play();
    if (loopMins > 0) {
      setInterval(play, loopMins * 60 * 1000);
    }
  })();
  </script>
</body>
</html>
