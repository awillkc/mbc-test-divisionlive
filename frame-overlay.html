<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;" />
  <title>Division Static Frame Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1920px; height: 1080px; overflow: hidden; background: transparent; }
    #frame { width: 1920px; height: 1080px; object-fit: contain; display: none; position: absolute; top: 0; left: 0; }
  </style>
</head>
<body>
  <img id="frame" alt="" />
  <script data-cfasync="false">
    (function () {
      var EDGE_FN_URL = 'https://qwasgcysgppajmdknlor.supabase.co/functions/v1/streamer-overlay-data';
      var params = new URLSearchParams(window.location.search);
      var sid = params.get('sid');
      if (!sid) { console.warn('[frame-overlay] No sid parameter'); return; }
      
      var frameEl = document.getElementById('frame');
      var currentFrameUrl = null;

      function fetchFrameUrl() {
        console.log('[frame-overlay] fetchFrameUrl called');
        
        var xhr = new XMLHttpRequest();
        xhr.open('GET', EDGE_FN_URL + '?sid=' + encodeURIComponent(sid) + '&t=' + Date.now(), true);
        
        xhr.onload = function() {
          console.log('[frame-overlay] xhr onload, status=' + xhr.status);
          if (xhr.status !== 200) {
            console.error('[frame-overlay] Bad status:', xhr.status);
            return;
          }
          
          try {
            var campaigns = JSON.parse(xhr.responseText);
            console.log('[frame-overlay] Got ' + campaigns.length + ' campaigns');
            
            var frameUrl = null;
            for (var i = 0; i < campaigns.length; i++) {
              if (campaigns[i].frame_url) {
                frameUrl = campaigns[i].frame_url;
                break;
              }
            }
            
            console.log('[frame-overlay] frameUrl=' + frameUrl);
            
            if (frameUrl) {
              frameEl.src = frameUrl;
              frameEl.style.display = 'block';
              console.log('[frame-overlay] Showing frame');
            }
          } catch (e) {
            console.error('[frame-overlay] JSON parse error:', e);
          }
        };
        
        xhr.onerror = function() {
          console.error('[frame-overlay] XHR error');
        };
        
        xhr.send();
      }

      console.log('[frame-overlay] Starting, sid=' + sid);
