<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;" />
  <title>Division Static Frame Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1920px; height: 1080px; overflow: hidden; background: transparent; }
    #frame { width: 1920px; height: 1080px; object-fit: contain; display: none; position: absolute; top: 0; left: 0; }
  </style>
</head>
<body>
  <img id="frame" alt="" />
  <script data-cfasync="false">
    (function () {
      var EDGE_FN_URL = 'https://qwasgcysgppajmdknlor.supabase.co/functions/v1/streamer-overlay-data';
      var POLL_INTERVAL = 30000;
      var params = new URLSearchParams(window.location.search);
      var sid = params.get('sid');
      if (!sid) { console.warn('[frame-overlay] No sid parameter'); return; }
      
      var frameEl = document.getElementById('frame');
      var currentFrameUrl = null;

      function fetchFrameUrl() {
        fetch(EDGE_FN_URL + '?sid=' + encodeURIComponent(sid) + '&t=' + Date.now(), {
          cache: 'no-store'
        })
        .then(function(res) {
          if (!res.ok) { 
            console.error('[frame-overlay] Fetch error', res.status); 
            return null; 
          }
          return res.json();
        })
        .then(function(campaigns) {
          if (!campaigns) return;
          
          var frameUrl = null;
          for (var i = 0; i < campaigns.length; i++) {
            if (campaigns[i].frame_url) {
              frameUrl = campaigns[i].frame_url;
              break;
            }
          }
          
          if (frameUrl && frameUrl !== currentFrameUrl) {
            currentFrameUrl = frameUrl;
            frameEl.src = frameUrl;
            frameEl.style.display = 'block';
            console.log('[frame-overlay] Showing frame:', frameUrl);
          } else if (!frameUrl && currentFrameUrl) {
            currentFrameUrl = null;
            frameEl.src = '';
            frameEl.style.display = 'none';
            console.log('[frame-overlay] No frame — hiding');
          }
        })
        .catch(function(err) {
          console.error('[frame-overlay] Poll error:', err);
        });
      }

      console.log('[frame-overlay] Starting, sid=' + sid);
      setTimeout(fetchFrameUrl, 1000);
      setInterval(fetchFrameUrl, POLL_INTERVAL);
    })();
  </script>
</body>
</html>
